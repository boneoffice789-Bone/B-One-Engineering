<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-One Engineering | ຜົນງານ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>...(navbar same as services.html)...</header>
<main>
  <section id="portfolio" style="padding: 80px 0;">
    <div class="container">
      <h2 class="section-title">ຜົນງານທີ່ພົ້ນເດັ່ນ <span style="font-size:1.4rem;">| FEATURED PROJECTS</span></h2>
      <p class="section-sub">ຕົວຢ່າງໂຄງການ ແລະ ຜົນງານທີ່ຜ່ານມາ</p>
      <div class="portfolio-grid" id="portfolioGrid">ກຳລັງໂຫຼດ...</div>
    </div>
  </section>
</main>
<footer>...</footer>
<a href="https://wa.me/8562059478899" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
<script> const mobileBtn = document.getElementById('mobile-menu'); const navLinks = document.getElementById('nav-links'); mobileBtn.addEventListener('click', () => navLinks.classList.toggle('active')); </script>
<script type="module">
  import { db, collection, getDocs } from './firebase-config.js';
  async function loadPortfolio() {
    const grid = document.getElementById('portfolioGrid');
    grid.innerHTML = 'ກຳລັງໂຫຼດ...';
    try {
      const snapshot = await getDocs(collection(db, 'portfolio'));
      if (snapshot.empty) { grid.innerHTML = '<div style="text-align:center;">ຍັງບໍ່ມີຜົນງານ</div>'; return; }
      grid.innerHTML = '';
      snapshot.forEach(doc => {
        const p = doc.data();
        const imageUrl = p.imageUrl || 'https://images.unsplash.com/photo-1581092160607-ee22621dd758?w=600&h=400&fit=crop';
        const card = document.createElement('div'); card.className = 'portfolio-card';
        card.innerHTML = `<div class="portfolio-img" style="background-image: url('${imageUrl}'); background-size: cover; background-position: center; height: 220px;"></div><h3>${p.title || 'ໂຄງການ'}</h3><p>${p.description || ''}</p>`;
        grid.appendChild(card);
      });
    } catch (err) { console.error(err); grid.innerHTML = '<div>ເກີດຂໍ້ຜິດພາດ</div>'; }
  }
  loadPortfolio();
</script>
</body>
</html>
