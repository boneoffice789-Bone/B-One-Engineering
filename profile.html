<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <title>ບັນຊີຂອງຂ້ອຍ | B-One</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .container { max-width: 600px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    h2 { color: #b30000; }
    .info { margin: 20px 0; }
    .info p { margin: 10px 0; }
    .btn { padding: 10px 20px; background: #b30000; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .btn-outline { background: #fff; color: #b30000; border: 1px solid #b30000; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>ບັນຊີຂອງຂ້ອຍ</h2>
    <div id="userInfo" class="info">
      <p><strong>ຊື່:</strong> <span id="displayName">-</span></p>
      <p><strong>ອີເມວ:</strong> <span id="userEmail">-</span></p>
      <p><strong>ເບີໂທ:</strong> <span id="userPhone">-</span></p>
    </div>
    <a href="orders.html" class="btn">ປະຫວັດຄຳສັ່ງຊື້</a>
    <button id="logoutBtn" class="btn btn-outline">ອອກຈາກລະບົບ</button>
    <a href="index.html" style="display:block; margin-top: 20px;">← ກັບໜ້າຫຼັກ</a>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, onAuthStateChanged, signOut } from './firebase-config.js';

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      document.getElementById('displayName').textContent = user.displayName || 'ບໍ່ລະບຸ';
      document.getElementById('userEmail').textContent = user.email;
      
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        document.getElementById('userPhone').textContent = snap.data().phone || '-';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
