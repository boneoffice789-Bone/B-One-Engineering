<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ບັນຊີຂອງຂ້ອຍ | B-One Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Lao', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .profile-header {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      padding: 35px 25px;
      text-align: center;
      color: white;
    }
    .profile-header i { font-size: 3rem; margin-bottom: 12px; }
    .profile-header h2 { font-size: 1.6rem; font-weight: 700; }
    .profile-body { padding: 35px 25px; }
    .info-card {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid #e9ecef;
    }
    .info-item:last-child { border-bottom: none; }
    .info-item i {
      width: 35px;
      height: 35px;
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info-item .label { font-weight: 600; color: #555; width: 80px; }
    .info-item .value { color: #333; font-weight: 500; }
    .btn-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(185,28,28,0.3); }
    .btn-outline {
      background: white;
      color: #b91c1c;
      border: 2px solid #b91c1c;
    }
    .btn-outline:hover { background: #b91c1c; color: white; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #6c757d;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: #b91c1c; }
  </style>
</head>
<body>
<div class="container">
  <div class="profile-header">
    <i class="fas fa-user-circle"></i>
    <h2>ບັນຊີຂອງຂ້ອຍ</h2>
  </div>
  <div class="profile-body">
    <div class="info-card">
      <div class="info-item"><i class="fas fa-user"></i><span class="label">ຊື່:</span><span class="value" id="displayName">-</span></div>
      <div class="info-item"><i class="fas fa-envelope"></i><span class="label">ອີເມວ:</span><span class="value" id="userEmail">-</span></div>
      <div class="info-item"><i class="fas fa-phone"></i><span class="label">ເບີໂທ:</span><span class="value" id="userPhone">-</span></div>
    </div>
    <div class="btn-group">
      <a href="orders.html" class="btn btn-primary"><i class="fas fa-shopping-bag"></i> ປະຫວັດຄຳສັ່ງຊື້</a>
      <button id="logoutBtn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> ອອກຈາກລະບົບ</button>
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-home"></i> ກັບໜ້າຫຼັກ</a>
  </div>
</div>
<script type="module">
  import { auth, db, doc, getDoc, signOut, onAuthStateChanged } from './firebase-config.js';
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    document.getElementById('displayName').textContent = user.displayName || 'ບໍ່ລະບຸ';
    document.getElementById('userEmail').textContent = user.email;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) document.getElementById('userPhone').textContent = snap.data().phone || '-';
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
