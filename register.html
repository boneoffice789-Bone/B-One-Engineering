<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ລົງທະບຽນ | B-One Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans Lao', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }

    .auth-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .auth-body {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 0.85rem;
    }

    .form-group label i {
      color: #b91c1c;
      margin-right: 8px;
      width: 20px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: #b91c1c;
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.1);
      transform: translateY(-1px);
    }

    .form-group input::placeholder {
      color: #a0aec0;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(185, 28, 28, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #dc3545;
      display: block;
    }

    .links {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .links a {
      color: #b91c1c;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .password-requirements {
      font-size: 0.7rem;
      color: #6b7280;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .password-requirements i {
      font-size: 0.6rem;
    }

    .password-requirements .valid {
      color: #28a745;
    }

    .footer {
      background: #f9fafb;
      padding: 15px 30px;
      text-align: center;
      font-size: 0.7rem;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .auth-header { padding: 30px 20px; }
      .auth-header h2 { font-size: 1.5rem; }
      .auth-body { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <i class="fas fa-user-plus" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
      <h2>ສ້າງບັນຊີ</h2>
      <p>ລົງທະບຽນເພື່ອເຂົ້າໃຊ້ບໍລິການ</p>
    </div>

    <div class="auth-body">
      <div id="messageBox" class="message"></div>

      <form id="registerForm">
        <div class="form-group">
          <label><i class="fas fa-user"></i> ຊື່ເຕັມ</label>
          <input type="text" id="name" placeholder="ຕົວຢ່າງ: ສົມສັກ ແກ້ວສຸວັນ" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-phone"></i> ເບີໂທລະສັບ</label>
          <input type="tel" id="phone" placeholder="ຕົວຢ່າງ: 020 12345678" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-envelope"></i> ອີເມວ</label>
          <input type="email" id="email" placeholder="ຕົວຢ່າງ: name@example.com" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-lock"></i> ລະຫັດຜ່ານ</label>
          <input type="password" id="password" placeholder="ຢ່າງໜ້ອຍ 6 ຕົວອັກສອນ" required minlength="6">
          <div class="password-requirements">
            <i class="fas fa-info-circle"></i>
            <span>ລະຫັດຜ່ານຕ້ອງມີຢ່າງໜ້ອຍ 6 ຕົວອັກສອນ</span>
          </div>
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <i class="fas fa-user-plus"></i> ລົງທະບຽນ
        </button>
      </form>

      <div class="links">
        <a href="login.html"><i class="fas fa-sign-in-alt"></i> ມີບັນຊີຢູ່ແລ້ວ? ເຂົ້າສູ່ລະບົບ</a>
        <br><br>
        <a href="index.html"><i class="fas fa-home"></i> ກັບໜ້າຫຼັກ</a>
      </div>
    </div>

    <div class="footer">
      © 2026 B-One Engineering Sole Co., Ltd
    </div>
  </div>

  <script type="module">
    import { auth, db, createUserWithEmailAndPassword, updateProfile, doc, setDoc, serverTimestamp } from './firebase-config.js';
    
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(msg, type) {
      messageBox.textContent = msg;
      messageBox.className = `message ${type}`;
      setTimeout(() => {
        messageBox.style.display = 'none';
        messageBox.className = 'message';
      }, 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      messageBox.style.display = 'none';

      if (!name || !phone || !email || !password) {
        showMessage('ກະລຸນາຕື່ມຂໍ້ມູນໃຫ້ຄົບຖ້ວນ', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('ລະຫັດຜ່ານຕ້ອງມີຢ່າງໜ້ອຍ 6 ຕົວອັກສອນ', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ກຳລັງລົງທະບຽນ...';

      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCred.user, { displayName: name });
        await setDoc(doc(db, 'users', userCred.user.uid), {
          displayName: name,
          email: email,
          phone: phone,
          role: 'customer',
          createdAt: serverTimestamp()
        });
        
        showMessage('ລົງທະບຽນສຳເລັດ! ກຳລັງພາທ່ານໄປຍັງໜ້າບັນຊີ...', 'success');
        
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 2000);
        
      } catch (err) {
        console.error('Registration error:', err);
        
        if (err.code === 'auth/email-already-in-use') {
          showMessage('ອີເມວນີ້ຖືກລົງທະບຽນແລ້ວ, ກະລຸນາໃຊ້ອີເມວອື່ນ', 'error');
        } else if (err.code === 'auth/invalid-email') {
          showMessage('ຮູບແບບອີເມວບໍ່ຖືກຕ້ອງ', 'error');
        } else if (err.code === 'auth/weak-password') {
          showMessage('ລະຫັດຜ່ານຄວນມີຄວາມສັບສົນຫຼາຍກວ່ານີ້', 'error');
        } else {
          showMessage('ເກີດຂໍ້ຜິດພາດ: ' + err.message, 'error');
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> ລົງທະບຽນ';
      }
    });
  </script>
</body>
</html>
