<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-One Engineering | ແບຣນຕົວແທນ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .brands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; margin-top: 40px; }
    .brand-card { background: white; border-radius: 16px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.07); transition: all 0.3s ease; border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; }
    .brand-card:hover { transform: translateY(-5px); border-color: #b91c1c; }
    .brand-logo { width: 120px; height: 120px; border-radius: 50%; background: #f9fafb; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 3rem; color: #b91c1c; border: 3px solid #f0f0f0; transition: all 0.3s ease; overflow: hidden; }
    .brand-name { font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; }
    .brand-category { font-size: 0.9rem; color: #6b7280; background: #f3f4f6; padding: 5px 15px; border-radius: 20px; }
    @media (max-width: 768px) { .brands-grid { grid-template-columns: repeat(2,1fr); gap: 15px; } .brand-logo { width: 80px; height: 80px; font-size: 2rem; } }
  </style>
</head>
<body>
<header>... (same navbar as products) ...</header>
<main>
  <section style="background: linear-gradient(135deg, #fef2f2 0%, #fff7f5 50%); padding: 60px 0 40px;">
    <div class="container">
      <h2 class="section-title">ແບຣນທີ່ເປັນຕົວແທນຈຳໜ່າຍ <span style="font-size:1.4rem;">| OUR BRANDS</span></h2>
      <p class="section-sub">ພວກເຮົາເປັນຕົວແທນຈຳໜ່າຍຢ່າງເປັນທາງການຈາກຫຼາຍແບຣນຊັ້ນນຳທົ່ວໂລກ</p>
      <div style="text-align:center;"><span style="display:inline-flex; align-items:center; gap:8px; background:#b91c1c; color:white; padding:8px 20px; border-radius:30px;"><i class="fas fa-check-circle"></i> ຕົວແທນຈຳໜ່າຍຢ່າງເປັນທາງການ</span></div>
    </div>
  </section>
  <section style="padding: 20px 0 60px;">
    <div class="container">
      <div class="brands-grid" id="brandsGrid">ກຳລັງໂຫຼດ...</div>
    </div>
  </section>
</main>
<footer>...</footer>
<a href="https://wa.me/8562059478899" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
<script>
  const mobileBtn = document.getElementById('mobile-menu');
  const navLinks = document.getElementById('nav-links');
  mobileBtn.addEventListener('click', () => navLinks.classList.toggle('active'));
</script>
<script type="module">
  import { db, collection, getDocs } from './firebase-config.js';

  async function loadBrands() {
    const grid = document.getElementById('brandsGrid');
    grid.innerHTML = 'ກຳລັງໂຫຼດ...';
    try {
      const snapshot = await getDocs(collection(db, 'brands'));
      if (snapshot.empty) { grid.innerHTML = '<div style="text-align:center;">ຍັງບໍ່ມີແບຣນ</div>'; return; }
      grid.innerHTML = '';
      snapshot.forEach(doc => {
        const b = doc.data();
        let icon = 'fa-building';
        const cat = (b.category || '').toLowerCase();
        if (cat.includes('ເຄື່ອງຈັກ') || cat.includes('ອຸດສາຫະກຳ')) icon = 'fa-industry';
        else if (cat.includes('ໄຟຟ້າ') || cat.includes('ພະລັງງານ')) icon = 'fa-bolt';
        else if (cat.includes('ວັດແທກ')) icon = 'fa-flask';
        else if (cat.includes('ຄອມພິວເຕີ') || cat.includes('ໄອທີ')) icon = 'fa-laptop';
        else if (cat.includes('ແອ') || cat.includes('ຄວາມເຢັນ')) icon = 'fa-snowflake';
        else if (cat.includes('ກໍ່ສ້າງ')) icon = 'fa-hard-hat';
        const card = document.createElement('div');
        card.className = 'brand-card';
        card.innerHTML = `
          <div class="brand-logo"><i class="fas ${icon}"></i></div>
          <div class="brand-name">${b.name}</div>
          <span class="brand-category">${b.category || 'ທົ່ວໄປ'}</span>
        `;
        grid.appendChild(card);
      });
    } catch (err) { console.error(err); grid.innerHTML = '<div>ເກີດຂໍ້ຜິດພາດ</div>'; }
  }
  loadBrands();
</script>
</body>
</html>
