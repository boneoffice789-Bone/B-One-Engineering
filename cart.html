<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ກະຕ່າສິນຄ້າ | B-One Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Lao', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .page-header {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      padding: 30px 25px;
      text-align: center;
      color: white;
    }
    .page-header i { font-size: 2rem; margin-bottom: 10px; }
    .page-header h2 { font-size: 1.5rem; font-weight: 700; }
    .page-body { padding: 30px 25px; }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 20px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      flex-wrap: wrap;
    }
    .cart-item:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    .cart-item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 16px;
    }
    .cart-item .details { flex: 1; min-width: 150px; }
    .cart-item .details h4 { font-size: 1.1rem; margin-bottom: 5px; color: #333; }
    .cart-item .details .price { color: #b91c1c; font-weight: 700; font-size: 1.1rem; }
    .cart-item .details .category { font-size: 0.8rem; color: #6c757d; }
    .qty {
      width: 70px;
      padding: 8px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      font-size: 0.9rem;
    }
    .item-total { font-weight: 700; font-size: 1.1rem; color: #333; min-width: 120px; text-align: right; }
    .btn-remove {
      background: none;
      border: none;
      color: #dc3545;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px;
      transition: all 0.2s;
    }
    .btn-remove:hover { transform: scale(1.1); }
    .cart-summary {
      background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      text-align: right;
      border: 1px solid #e9ecef;
    }
    .cart-summary h3 { font-size: 1.3rem; margin-bottom: 10px; }
    .cart-summary .total { font-size: 1.8rem; font-weight: 800; color: #b91c1c; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-top: 15px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(185, 28, 28, 0.3); }
    .btn-outline {
      background: white;
      color: #b91c1c;
      border: 2px solid #b91c1c;
      margin-right: 10px;
    }
    .btn-outline:hover { background: #b91c1c; color: white; }
    .empty-cart {
      text-align: center;
      padding: 50px;
      color: #6c757d;
    }
    .empty-cart i { font-size: 4rem; margin-bottom: 15px; opacity: 0.5; }
    .action-buttons { display: flex; justify-content: flex-end; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #6c757d; text-decoration: none; }
    .back-link:hover { color: #b91c1c; }
    @media (max-width: 768px) {
      .cart-item { flex-direction: column; text-align: center; }
      .cart-item img { width: 120px; height: 120px; }
      .item-total { text-align: center; width: 100%; }
      .action-buttons { flex-direction: column; }
      .btn-outline { margin-right: 0; margin-bottom: 10px; }
      .cart-summary { text-align: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="page-header">
    <i class="fas fa-shopping-cart"></i>
    <h2>ກະຕ່າສິນຄ້າ</h2>
  </div>
  <div class="page-body">
    <div id="cartItems"></div>
    <div id="cartSummary" class="cart-summary" style="display: none;">
      <h3>ລວມທັງໝົດ</h3>
      <div class="total">₭<span id="totalPrice">0</span></div>
      <div class="action-buttons">
        <a href="products.html" class="btn btn-outline"><i class="fas fa-plus"></i> ເພີ່ມສິນຄ້າເພີ່ມ</a>
        <a href="checkout.html" class="btn" id="checkoutBtn"><i class="fas fa-credit-card"></i> ດຳເນີນການສັ່ງຊື້</a>
      </div>
    </div>
    <a href="products.html" class="back-link"><i class="fas fa-arrow-left"></i> ເລືອກສິນຄ້າຕໍ່</a>
  </div>
</div>

<script>
  const cart = JSON.parse(localStorage.getItem('b_one_cart') || '[]');
  const container = document.getElementById('cartItems');
  const summaryDiv = document.getElementById('cartSummary');
  let total = 0;

  function renderCart() {
    container.innerHTML = '';
    total = 0;
    
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-cart"></i><p>ກະຕ່າສິນຄ້າຫວ່າງເປົ່າ</p><a href="products.html" class="btn" style="display: inline-block; margin-top: 15px;">ເລີ່ມເລືອກຊື້ສິນຄ້າ</a></div>';
      summaryDiv.style.display = 'none';
      return;
    }
    
    summaryDiv.style.display = 'block';
    
    cart.forEach((item, index) => {
      total += item.price * item.quantity;
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <img src="${item.image || 'https://via.placeholder.com/100'}" alt="${item.name}" loading="lazy">
        <div class="details">
          <h4>${item.name}</h4>
          <div class="category">${item.category || 'ສິນຄ້າທົ່ວໄປ'}</div>
          <div class="price">₭${item.price.toLocaleString()}</div>
        </div>
        <input type="number" class="qty" value="${item.quantity}" min="1" data-index="${index}">
        <div class="item-total">₭${(item.price * item.quantity).toLocaleString()}</div>
        <button class="btn-remove" data-index="${index}"><i class="fas fa-trash-alt"></i></button>
      `;
      container.appendChild(div);
    });
    document.getElementById('totalPrice').textContent = total.toLocaleString();
  }

  renderCart();

  container.addEventListener('click', (e) => {
    const removeBtn = e.target.closest('.btn-remove');
    if (removeBtn) {
      const index = removeBtn.dataset.index;
      cart.splice(index, 1);
      localStorage.setItem('b_one_cart', JSON.stringify(cart));
      renderCart();
    }
  });

  container.addEventListener('change', (e) => {
    if (e.target.classList.contains('qty')) {
      const index = e.target.dataset.index;
      let newQty = parseInt(e.target.value);
      if (isNaN(newQty) || newQty < 1) newQty = 1;
      cart[index].quantity = newQty;
      localStorage.setItem('b_one_cart', JSON.stringify(cart));
      renderCart();
    }
  });
</script>
</body>
</html>
