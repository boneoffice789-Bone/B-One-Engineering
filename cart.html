<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ສັ່ງຊື້ | B-One Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Lao', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .page-header {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      padding: 30px 25px;
      text-align: center;
      color: white;
    }
    .page-header i { font-size: 2rem; margin-bottom: 10px; }
    .page-header h2 { font-size: 1.5rem; font-weight: 700; }
    .page-body { padding: 30px 25px; }
    .cart-summary {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-family: inherit;
      transition: all 0.3s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: #b91c1c;
      outline: none;
      box-shadow: 0 0 0 3px rgba(185,28,28,0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(185,28,28,0.4); }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #6c757d; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <i class="fas fa-credit-card"></i>
    <h2>ຢືນຢັນຄຳສັ່ງຊື້</h2>
  </div>
  <div class="page-body">
    <div class="cart-summary" id="cartSummary"></div>
    <form id="orderForm">
      <div class="form-group"><input type="text" id="name" placeholder="ຊື່ຜູ້ຮັບ *" required></div>
      <div class="form-group"><input type="tel" id="phone" placeholder="ເບີໂທລະສັບ *" required></div>
      <div class="form-group"><input type="email" id="email" placeholder="ອີເມວ"></div>
      <div class="form-group"><textarea id="address" rows="3" placeholder="ທີ່ຢູ່ຈັດສົ່ງ *" required></textarea></div>
      <div class="form-group">
        <select id="paymentMethod" required>
          <option value="">-- ວິທີຊຳລະເງິນ --</option>
          <option value="cash">ເງິນສົດ (ເກັບປາຍທາງ)</option>
          <option value="transfer">ໂອນເງິນ</option>
        </select>
      </div>
      <button type="submit" class="btn" id="submitBtn">ຢືນຢັນການສັ່ງຊື້</button>
    </form>
    <a href="cart.html" class="back-link"><i class="fas fa-arrow-left"></i> ກັບໄປກະຕ່າສິນຄ້າ</a>
  </div>
</div>
<script type="module">
  import { auth, db, collection, addDoc, serverTimestamp, onAuthStateChanged } from './firebase-config.js';
  const cart = JSON.parse(localStorage.getItem('b_one_cart') || '[]');
  if (cart.length === 0) window.location.href = 'cart.html';
  let total = 0;
  const summary = document.getElementById('cartSummary');
  summary.innerHTML = cart.map(item => {
    total += item.price * item.quantity;
    return `<p><strong>${item.name}</strong> x ${item.quantity} = ₭${(item.price * item.quantity).toLocaleString()}</p>`;
  }).join('');
  summary.innerHTML += `<h3>ລວມທັງໝົດ: ₭${total.toLocaleString()}</h3>`;
  
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      alert('ກະລຸນາເຂົ້າສູ່ລະບົບກ່ອນສັ່ງຊື້');
      window.location.href = 'login.html';
    }
  });
  
  document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = auth.currentUser;
    if (!user) {
      alert('ກະລຸນາເຂົ້າສູ່ລະບົບກ່ອນ');
      window.location.href = 'login.html';
      return;
    }
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ກຳລັງດຳເນີນ...';
    try {
      await addDoc(collection(db, 'orders'), {
        userId: user.uid,
        customerInfo: {
          name: document.getElementById('name').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          email: document.getElementById('email').value.trim()
        },
        items: cart.map(item => ({ productId: item.id, productName: item.name, quantity: item.quantity, unitPrice: item.price, totalPrice: item.price * item.quantity })),
        totalAmount: total,
        paymentMethod: document.getElementById('paymentMethod').value,
        orderStatus: 'pending',
        shippingAddress: document.getElementById('address').value.trim(),
        createdAt: serverTimestamp()
      });
      localStorage.removeItem('b_one_cart');
      alert('ສັ່ງຊື້ສຳເລັດ!');
      window.location.href = 'orders.html';
    } catch (err) {
      console.error(err);
      alert('ເກີດຂໍ້ຜິດພາດ, ກະລຸນາລອງໃໝ່');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'ຢືນຢັນການສັ່ງຊື້';
    }
  });
</script>
</body>
</html>
