<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ຄຳສັ່ງຊື້ຂອງຂ້ອຍ | B-One Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Sans+Lao:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans Lao', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .page-header {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      padding: 30px 25px;
      text-align: center;
      color: white;
    }
    .page-header i { font-size: 2rem; margin-bottom: 10px; }
    .page-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
    .page-header p { font-size: 0.8rem; opacity: 0.9; }
    .page-body { padding: 30px 25px; }
    .order-card {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      border: 1px solid #e9ecef;
    }
    .order-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-id {
      background: linear-gradient(135deg, #b91c1c 0%, #d43f3f 100%);
      color: white;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .order-status {
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #cfe2ff; color: #084298; }
    .status-processing { background: #cff4fc; color: #055160; }
    .status-shipped { background: #d1e7dd; color: #0f5132; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .payment-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .payment-waiting { background: #fff3cd; color: #856404; }
    .payment-verified { background: #d4edda; color: #155724; }
    .order-details p { margin: 8px 0; color: #4a5568; font-size: 0.9rem; }
    .order-details i { width: 28px; color: #b91c1c; }
    .order-items {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #dee2e6;
      font-size: 0.85rem;
    }
    .order-items summary {
      font-weight: 600;
      cursor: pointer;
      color: #b91c1c;
    }
    .slip-preview {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .slip-preview img {
      max-width: 120px;
      max-height: 120px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .btn-cancel {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-cancel:hover { background: #bb2d3b; transform: scale(1.02); }
    .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 50px 20px; color: #6c757d; }
    .empty-state i { font-size: 3.5rem; margin-bottom: 15px; opacity: 0.6; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 25px;
      color: #6c757d;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: #b91c1c; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    @media (max-width: 550px) {
      .order-header { flex-direction: column; align-items: flex-start; }
      .page-body { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="page-header">
    <i class="fas fa-shopping-bag"></i>
    <h2>ປະຫວັດຄຳສັ່ງຊື້</h2>
    <p>ລາຍການສັ່ງຊື້ທັງໝົດຂອງທ່ານ</p>
  </div>
  <div class="page-body">
    <div id="orderList"></div>
    <div class="flex-between">
      <a href="profile.html" class="back-link"><i class="fas fa-arrow-left"></i> ກັບໄປບັນຊີ</a>
      <button id="refreshBtn" class="back-link" style="background:none; border:none;"><i class="fas fa-sync-alt"></i> ຣີໂຫຼດ</button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db, collection, query, where, orderBy, getDocs, doc, updateDoc, onAuthStateChanged } from './firebase-config.js';

  const orderListDiv = document.getElementById('orderList');
  const refreshBtn = document.getElementById('refreshBtn');

  function showLoading() {
    orderListDiv.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i><p>ກຳລັງໂຫຼດຂໍ້ມູນ...</p></div>`;
  }
  function showEmpty() {
    orderListDiv.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>ທ່ານຍັງບໍ່ມີຄຳສັ່ງຊື້</p><a href="products.html" style="color:#b91c1c; text-decoration:underline;">ເລີ່ມສັ່ງຊື້ສິນຄ້າ →</a></div>`;
  }
  function showError(errMsg) {
    orderListDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${errMsg || 'ເກີດຂໍ້ຜິດພາດ, ກະລຸນາລອງໃໝ່'}</p><button class="btn-cancel" onclick="location.reload()" style="background:#b91c1c; padding:8px 20px;">ລອງໃໝ່</button></div>`;
  }

  window.cancelOrder = async (orderId, currentStatus) => {
    if (currentStatus === 'cancelled') { alert('ຄຳສັ່ງນີ້ຖືກຍົກເລີກແລ້ວ'); return; }
    if (currentStatus === 'delivered') { alert('ຄຳສັ່ງທີ່ສົ່ງມອບແລ້ວບໍ່ສາມາດຍົກເລີກໄດ້'); return; }
    if (confirm('ທ່ານຕ້ອງການຍົກເລີກຄຳສັ່ງນີ້ ແທ້ ຫຼື ບໍ່?')) {
      try {
        await updateDoc(doc(db, 'orders', orderId), { orderStatus: 'cancelled' });
        alert('ຍົກເລີກຄຳສັ່ງສຳເລັດ');
        const user = auth.currentUser;
        if (user) loadOrders(user.uid);
      } catch (err) { alert('ຜິດພາດ: '+err.message); }
    }
  };

  async function loadOrders(userId) {
    showLoading();
    try {
      // ຮອງຮັບທັງ 'userId' ແລະ 'userid' (ຍ້ອນຂໍ້ມູນເກົ່າອາດມີຊື່ບໍ່ຖືກຕ້ອງ)
      // ໃຊ້ query ຫາທັງສອງຊື່ ແລະ ຮວມຜົນ
      const q1 = query(collection(db, 'orders'), where('userId', '==', userId));
      const q2 = query(collection(db, 'orders'), where('userid', '==', userId));
      const [snap1, snap2] = await Promise.all([getDocs(q1), getDocs(q2)]);
      
      const allDocs = [];
      snap1.forEach(doc => allDocs.push({ id: doc.id, ...doc.data() }));
      snap2.forEach(doc => {
        if (!allDocs.some(d => d.id === doc.id)) {
          allDocs.push({ id: doc.id, ...doc.data() });
        }
      });
      
      if (allDocs.length === 0) {
        showEmpty();
        return;
      }
      
      // ຈັດລຽງຕາມ createdAt (ຖ້າມີ) ຫຼື ຕາມ document id
      allDocs.sort((a, b) => {
        const timeA = a.createdAt?.seconds || 0;
        const timeB = b.createdAt?.seconds || 0;
        return timeB - timeA;
      });
      
      let html = '';
      for (const order of allDocs) {
        const orderIdShort = order.id.slice(0, 8);
        let date = 'ບໍ່ລະບຸ';
        if (order.createdAt && order.createdAt.seconds) {
          date = new Date(order.createdAt.seconds * 1000).toLocaleDateString('lo-LA');
        }
        
        const statusMap = {
          pending: { text: 'ກຳລັງດຳເນີນ', class: 'status-pending' },
          confirmed: { text: 'ຢືນຢັນແລ້ວ', class: 'status-confirmed' },
          processing: { text: 'ກຳລັງກະກຽມ', class: 'status-processing' },
          shipped: { text: 'ຈັດສົ່ງແລ້ວ', class: 'status-shipped' },
          delivered: { text: 'ສຳເລັດ', class: 'status-delivered' },
          cancelled: { text: 'ຍົກເລີກແລ້ວ', class: 'status-cancelled' }
        };
        const status = statusMap[order.orderStatus] || statusMap.pending;
        
        let paymentStatusHtml = '';
        let slipHtml = '';
        if (order.paymentMethod === 'transfer') {
          if (order.paymentStatus === 'waiting_verification') {
            paymentStatusHtml = `<span class="payment-status payment-waiting"><i class="fas fa-clock"></i> ລໍຖ້າກວດສອບສະລິບ</span>`;
          } else if (order.paymentStatus === 'verified') {
            paymentStatusHtml = `<span class="payment-status payment-verified"><i class="fas fa-check-circle"></i> ຢັ້ງຢືນການຈ່າຍແລ້ວ</span>`;
          }
          if (order.slipUrl) {
            slipHtml = `
              <div class="slip-preview">
                <i class="fas fa-receipt"></i> 
                <a href="${order.slipUrl}" target="_blank">ເບິ່ງສະລິບ</a>
                <img src="${order.slipUrl}" alt="slip" loading="lazy">
              </div>
            `;
          }
        }
        
        let itemsHtml = '';
        if (order.items && order.items.length) {
          itemsHtml = `<details class="order-items"><summary><i class="fas fa-list-ul"></i> ລາຍການສິນຄ້າ (${order.items.length})</summary><div style="margin-top:8px;">`;
          order.items.forEach(item => {
            itemsHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:6px;"><span>${item.productName} x ${item.quantity}</span><span>₭${(item.totalPrice || item.unitPrice * item.quantity).toLocaleString()}</span></div>`;
          });
          itemsHtml += `</div></details>`;
        }
        
        let cancelButtonHtml = '';
        if (order.orderStatus !== 'cancelled' && order.orderStatus !== 'delivered') {
          cancelButtonHtml = `<div style="text-align:right; margin-top:10px;"><button class="btn-cancel" onclick="cancelOrder('${order.id}', '${order.orderStatus}')"><i class="fas fa-times-circle"></i> ຍົກເລີກຄຳສັ່ງ</button></div>`;
        }
        
        html += `
          <div class="order-card">
            <div class="order-header">
              <span class="order-id"><i class="fas fa-hashtag"></i> ${orderIdShort}</span>
              <div>
                <span class="order-status ${status.class}">${status.text}</span>
                ${paymentStatusHtml}
              </div>
            </div>
            <div class="order-details">
              <p><i class="fas fa-calendar-alt"></i> ວັນທີສັ່ງ: ${date}</p>
              <p><i class="fas fa-money-bill-wave"></i> ຍອດລວມ: ₭${(order.totalAmount || 0).toLocaleString()}</p>
              <p><i class="fas fa-truck"></i> ທີ່ຢູ່ຈັດສົ່ງ: ${order.shippingAddress || 'ບໍ່ລະບຸ'}</p>
              <p><i class="fas fa-credit-card"></i> ວິທີຊຳລະ: ${order.paymentMethod === 'cash' ? 'ເງິນສົດ (ເກັບປາຍທາງ)' : 'ໂອນເງິນຜ່ານທະນາຄານ'}</p>
              ${slipHtml}
              ${itemsHtml}
            </div>
            ${cancelButtonHtml}
          </div>
        `;
      }
      orderListDiv.innerHTML = html;
    } catch (error) {
      console.error('Error loading orders:', error);
      showError('ບໍ່ສາມາດໂຫຼດຂໍ້ມູນຄຳສັ່ງຊື້ໄດ້. ກະລຸນາກວດສອບເນັດວຽກ ຫຼື ລອງໃໝ່.');
    }
  }

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    loadOrders(user.uid);
  });

  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      const user = auth.currentUser;
      if (user) loadOrders(user.uid);
      else window.location.href = 'login.html';
    });
  }
</script>
</body>
</html>
